<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Guitar Chords Quiz</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="../styles/style.css" rel="stylesheet" />
    <script src="../scripts/auth.js" defer></script>
    <script src="../scripts/functions.js" defer></script>
    <script src="../scripts/quiz.js" defer></script>
</head>

<body>
    <header>
        <div class="user-controls">
            <a href="profile.html" class="user-profile">
                <img id="user-avatar" alt="User Avatar" />
                <span id="user-info"></span>
            </a>
            <a href="#" id="logout-link">Log out</a>
        </div>
        <div class="container">
            <div id="branding">
                <h1 data-translate="main.title"></h1>
                <p data-translate="main.subtitle"></p>
            </div>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html"><i class="fas fa-guitar"></i>Basics</a></li>
            <li><a href="chords.html"><i class="fas fa-music"></i>Chords</a></li>
            <li class="current"><a href="quiz.html"><i class="fas fa-question-circle"></i>Quiz</a></li>
        </ul>
    </nav>

    <aside>
        <button id="fontInc">Font+</button>
        <button id="fontDec">Font-</button>
        <button id="cn">中文</button>
        <button id="en">EN</button>
        <button id="de">DE</button>
    </aside>

    <main id="quiz-main">
        <div class="container">
            <section id="quiz">
                <h2 data-translate="quiz.title">Test Your Chord Knowledge</h2>
                <div class="quiz-settings">
                    <label data-translate="quiz.question-count" for="question-count">Number of Questions:</label>
                    <select id="question-count">
                        <option value="5" selected>5</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                    </select>
                    <button data-translate="quiz.start-quiz" id="start-quiz">Start Quiz</button>
                </div>
                <div id="quiz-container" style="display: none">
                    <div id="question-container">
                        <h3 id="question-text"></h3>
                        <h2 id="chord-name"></h2>
                    </div>
                    <div id="options-container"></div>
                    <div id="result-message"></div>

                </div>
            </section>
        </div>
    </main>
    <footer>&copy; 2025 Guitar Guide. All rights reserved.</footer>
</body>

</html>
